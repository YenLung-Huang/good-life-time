<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>good life time — 友善時光</title>
  <meta name="description" content="找附近超商優惠：7-11、全家。即期特價聰明省">
  <meta name="theme-color" content="#F97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#FAFAF8',
            card: '#FFFFFF',
            text: '#1A1A1A',
            muted: '#8A8A8A',
            accent: '#F97316',
            'family-blue': '#3B82F6',
            'seven-orange': '#F97316',
          },
          fontFamily: {
            sans: ['Noto Sans TC', 'Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Base */
    body { background-color: #FAFAF8; -webkit-tap-highlight-color: transparent; }
    [x-cloak] { display: none !important; }

    /* Smooth scroll */
    * { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

    /* Card */
    .card {
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .card:active {
      transform: scale(0.98);
    }

    /* Pulse animation for GPS button */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .gps-pulse::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 9999px;
      border: 2px solid currentColor;
      animation: pulse-ring 1.5s ease-out infinite;
    }

    /* Skeleton */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Tab active indicator */
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>

<body class="font-sans text-text antialiased"
  x-data="app()"
  x-init="init()">

  <!-- ========== HEADER ========== -->
  <header class="sticky top-0 z-40 bg-card/95 backdrop-blur-sm border-b border-gray-100">
    <div class="max-w-lg mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <!-- Logo -->
        <div>
          <h1 class="font-semibold text-lg">
            <span class="text-accent">good</span> <span class="text-text">life</span> <span class="text-muted text-sm">time</span>
          </h1>
          <p class="text-xs text-muted">
            <span x-show="lastUpdated">更新 <span x-text="lastUpdated"></span></span>
            <span x-show="loading" class="inline-flex ml-1">
              <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-30" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-70" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </span>
          </p>
        </div>

        <!-- GPS + Refresh -->
        <div class="flex gap-2">
          <!-- GPS定位按鈕 -->
          <button @click="getLocation()"
            :disabled="locating"
            :class="locationError ? 'text-red-500' : userLocation ? 'text-family-blue' : 'text-muted'"
            class="relative p-2 rounded-full transition-colors disabled:opacity-50"
            :title="locationError || '定位附近的店'">
            <svg x-show="!locating" class="w-5 h-5" :class="userLocation ? 'gps-pulse' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <svg x-show="locating" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-30" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
              <path class="opacity-70" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>

          <!-- 刷新 -->
          <button @click="refresh()" :disabled="loading"
            class="p-2 rounded-full bg-accent/10 text-accent hover:bg-accent/20 transition-colors disabled:opacity-50">
            <svg class="w-5 h-5" :class="loading ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Location display -->
      <div x-show="userLocation" x-transition class="mt-2 text-xs text-muted flex items-center gap-1">
        <svg class="w-3 h-3 text-family-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
        </svg>
        <span>你在<span x-text="userLocation"></span>附近</span>
        <button @click="userLocation = null; sortByDistance = false" class="ml-1 text-muted hover:text-text">✕</button>
      </div>

      <!-- 定位錯誤 -->
      <div x-show="locationError" x-transition class="mt-2 text-xs text-red-500 flex items-center gap-1">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span x-text="locationError"></span>
      </div>
    </div>

    <!-- Tabs: 商店選擇 -->
    <div class="max-w-lg mx-auto px-4 pb-3">
      <!-- 已選擇的店 -->
      <div x-show="selectedStore" x-transition class="mb-3 p-3 rounded-xl bg-gray-50 border border-gray-100">
        <div class="flex items-center justify-between">
          <div>
            <div class="flex items-center gap-2">
              <span class="text-lg" :class="selectedStore.chain === 'seven' ? 'text-accent' : 'text-family-blue'" x-text="selectedStore.chain === 'seven' ? '7-11' : '全家'"></span>
              <span class="font-medium" x-text="selectedStore.name"></span>
            </div>
            <div class="text-xs text-muted mt-0.5">
              <span x-text="selectedStore.distance"></span>km · <span x-text="selectedStore.addr"></span>
            </div>
          </div>
          <button @click="selectedStore = null" class="p-2 text-muted hover:text-text">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tab: 全部/7-11/全家 -->
      <div class="flex gap-2 overflow-x-auto">
        <button @click="activeTab = 'all'; filterProducts()"
          :class="activeTab === 'all' ? 'bg-text text-white' : 'bg-white border border-gray-200 text-muted hover:border-gray-300'"
          class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all">
          全部 <span class="opacity-70" x-text="'(' + counts.all + ')'"></span>
        </button>
        <button @click="activeTab = 'seven'; filterProducts()"
          :class="activeTab === 'seven' ? 'bg-accent text-white' : 'bg-white border border-gray-200 text-muted hover:border-gray-300'"
          class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all flex items-center gap-1">
          <span class="w-2 h-2 rounded-full bg-accent"></span>
          7-11 <span class="opacity-70" x-text="'(' + counts.seven + ')'"></span>
        </button>
        <button @click="activeTab = 'family'; filterProducts()"
          :class="activeTab === 'family' ? 'bg-family-blue text-white' : 'bg-white border border-gray-200 text-muted hover:border-gray-300'"
          class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all flex items-center gap-1">
          <span class="w-2 h-2 rounded-full bg-family-blue"></span>
          全家 <span class="opacity-70" x-text="'(' + counts.family + ')'"></span>
        </button>
      </div>

      <!-- 附近店鋪列表 (GPS mode) -->
      <div x-show="nearbyStores.length > 0" x-transition class="mt-3 space-y-2">
        <div class="text-xs text-muted mb-2">附近的店</div>
        <template x-for="store in nearbyStores.slice(0, 5)" :key="store.id">
          <button @click="selectStore(store)"
            class="w-full p-2 rounded-lg bg-white border border-gray-100 hover:border-gray-200 text-left transition-all flex items-center justify-between">
            <div>
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full" :class="store.chain === 'seven' ? 'bg-accent' : 'bg-family-blue'"></span>
                <span class="font-medium text-sm" :class="store.chain === 'seven' ? 'text-accent' : 'text-family-blue'" x-text="store.chain === 'seven' ? '7-11' : '全家'"></span>
                <span class="text-sm" x-text="store.name"></span>
              </div>
              <div class="text-xs text-muted" x-text="store.addr"></div>
            </div>
            <div class="text-right">
              <div class="text-sm font-medium" x-text="store.distance + 'km'"></div>
              <div class="text-xs text-muted" x-text="store.productCount + '件優惠'"></div>
            </div>
          </button>
        </template>
      </div>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="max-w-lg mx-auto px-4 pb-8">

    <!-- Loading Skeleton -->
    <template x-if="loading && products.length === 0">
      <div class="grid grid-cols-2 gap-3 pt-2">
        <template x-for="i in 8">
          <div class="bg-card rounded-2xl overflow-hidden">
            <div class="aspect-square skeleton"></div>
            <div class="p-3 space-y-2">
              <div class="h-4 skeleton rounded w-full"></div>
              <div class="h-3 skeleton rounded w-2/3"></div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Error -->
    <template x-if="error">
      <div class="text-center py-12">
        <p class="text-muted mb-4">載入失敗</p>
        <button @click="refresh()" class="px-4 py-2 bg-accent text-white rounded-full text-sm">
          重試
        </button>
      </div>
    </template>

    <!-- Empty -->
    <template x-if="!loading && displayProducts.length === 0 && !error">
      <div class="text-center py-12">
        <p class="text-muted" x-text="selectedStore ? '這間店沒有優惠商品' : '目前沒有優惠'"></p>
        <p x-show="selectedStore" class="text-xs text-muted mt-2">試試選其他間店</p>
      </div>
    </template>

    <!-- Products Grid -->
    <div class="grid grid-cols-2 gap-3 pt-2">
      <template x-for="(product, idx) in displayProducts" :key="product.id">
        <div class="card bg-card rounded-2xl overflow-hidden shadow-sm"
          :style="'animation-delay: ' + (idx % 6) * 30 + 'ms'"
          @click="openModal(product)">
          <!-- Image -->
          <div class="aspect-square bg-gray-100 relative">
            <img :src="product.image_url" :alt="product.name"
              class="w-full h-full object-cover"
              @error="$el.src='https://placehold.co/400x400/F5F5F4/CCC?text=無圖'">
            <!-- Discount badge -->
            <span x-show="product.discount_percent > 0"
              class="absolute top-2 left-2 px-1.5 py-0.5 rounded-md text-xs font-bold text-white"
              :class="product.store_id === 'seven' ? 'bg-accent' : 'bg-family-blue'"
              x-text="'-' + product.discount_percent + '%'">
            </span>
          </div>
          <!-- Info -->
          <div class="p-2.5">
            <p class="text-sm font-medium leading-snug line-clamp-2 mb-1" x-text="product.name"></p>
            <div class="flex items-baseline gap-1.5">
              <span class="text-base font-bold" :class="product.store_id === 'seven' ? 'text-accent' : 'text-family-blue'"
                x-text="'$' + product.friendly_price"></span>
              <span x-show="product.original_price > 0" class="text-xs text-muted line-through"
                x-text="'$' + product.original_price"></span>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Load More -->
    <template x-if="hasMore">
      <div class="text-center mt-6">
        <button @click="loadMore()"
          class="px-6 py-2.5 border border-gray-200 rounded-full text-sm text-muted hover:border-text hover:text-text transition-all">
          看更多 (<span x-text="filteredProducts.length - displayProducts.length"></span>)
        </button>
      </div>
    </template>
  </main>

  <!-- ========== MODAL ========== -->
  <div x-show="modalOpen" x-cloak
    class="fixed inset-0 z-50 flex items-end sm:items-center justify-center"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click.self="modalOpen = false"
    @keydown.escape.window="modalOpen = false">

    <div class="absolute inset-0 bg-black/30 sm:bg-black/40"></div>

    <div class="relative bg-card w-full sm:max-w-md sm:rounded-2xl overflow-hidden shadow-2xl max-h-[90vh] flex flex-col"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="translate-y-full"
      x-transition:enter-end="translate-y-0">

      <!-- Image -->
      <div class="aspect-square bg-gray-100 flex-shrink-0 relative">
        <img :src="selectedProduct?.image_url" :alt="selectedProduct?.name"
          class="w-full h-full object-cover"
          @error="$el.src='https://placehold.co/400x400/F5F5F4/CCC?text=無圖'">
        <button @click="modalOpen = false"
          class="absolute top-3 right-3 w-9 h-9 bg-black/40 backdrop-blur text-white rounded-full flex items-center justify-center hover:bg-black/60 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
        <span x-show="selectedProduct?.discount_percent > 0"
          class="absolute top-3 left-3 px-2 py-0.5 rounded-full text-sm font-bold text-white"
          :class="selectedProduct?.store_id === 'seven' ? 'bg-accent' : 'bg-family-blue'"
          x-text="'-' + selectedProduct?.discount_percent + '%'">
        </span>
      </div>

      <!-- Info -->
      <div class="p-5 overflow-y-auto">
        <div class="flex items-start justify-between gap-3 mb-3">
          <h3 class="font-medium text-lg leading-snug" x-text="selectedProduct?.name"></h3>
          <span class="text-xs px-2 py-0.5 rounded-full whitespace-nowrap"
            :class="selectedProduct?.store_id === 'seven' ? 'bg-accent/10 text-accent' : 'bg-family-blue/10 text-family-blue'"
            x-text="selectedProduct?.store_name">
          </span>
        </div>

        <div class="flex items-baseline gap-2 mb-4">
          <span class="text-2xl font-bold" :class="selectedProduct?.store_id === 'seven' ? 'text-accent' : 'text-family-blue'"
            x-text="'$' + selectedProduct?.friendly_price"></span>
          <span x-show="selectedProduct?.original_price > 0" class="text-base text-muted line-through"
            x-text="'$' + selectedProduct?.original_price"></span>
        </div>

        <div x-show="selectedProduct?.note" class="text-sm text-muted mb-4 pb-4 border-b border-gray-100">
          <span x-text="selectedProduct?.note"></span>
        </div>

        <div x-show="selectedProduct?.store_id === 'seven' && selectedProduct?.store_name" class="text-sm text-muted">
          <p>7-11 門市優惠，實際折扣以門市為準</p>
        </div>
        <div x-show="selectedProduct?.store_id === 'family' && selectedProduct?.store_name" class="text-sm text-muted">
          <p>全家便利商店優惠，實際折扣以門市為準</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== APP LOGIC ========== -->
  <script>
    function app() {
      return {
        // Data URLs
        dataUrl: 'https://yenlung-huang.github.io/good-life-time/data/data.json',
        storesUrl: 'https://yenlung-huang.github.io/good-life-time/data/stores.json',

        // State
        loading: true,
        error: false,
        lastUpdated: '',
        products: [],
        storeChains: [],
        counts: { all: 0, seven: 0, family: 0 },

        // UI State
        activeTab: 'all',
        filteredProducts: [],
        displayProducts: [],
        pageSize: 12,
        currentPage: 1,
        hasMore: false,
        modalOpen: false,
        selectedProduct: null,

        // GPS / Location
        userLocation: null,
        locating: false,
        locationError: null,
        allStores: [],
        nearbyStores: [],
        selectedStore: null,
        sortByDistance: false,

        // Embed fallback data (minimal - just for offline)
        embeddedData: null,

        init() {
          this.fetchData();
          this.fetchStores();
          // Reload data every 15 min
          setInterval(() => this.fetchData(true), 15 * 60 * 1000);
        },

        // --- GPS Location ---
        async getLocation() {
          if (!navigator.geolocation) {
            this.locationError = '瀏覽器不支援定位';
            return;
          }

          this.locating = true;
          this.locationError = null;

          try {
            const pos = await new Promise((resolve, reject) => {
              navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 300000 // 5 min cache
              });
            });

            this.userLat = pos.coords.latitude;
            this.userLng = pos.coords.longitude;
            this.userLocation = this.formatDistance(this.userLat, this.userLng);

            // Sort stores by distance
            this.sortStoresByDistance();

          } catch (err) {
            switch (err.code) {
              case err.PERMISSION_DENIED:
                this.locationError = '請允許位置權限';
                break;
              case err.POSITION_UNAVAILABLE:
                this.locationError = '無法取得位置';
                break;
              case err.TIMEOUT:
                this.locationError = '位置逾時';
                break;
              default:
                this.locationError = '定位失敗';
            }
          } finally {
            this.locating = false;
          }
        },

        // --- Store Data ---
        async fetchStores() {
          try {
            const resp = await fetch(this.storesUrl + '?t=' + Date.now());
            if (!resp.ok) throw new Error('Stores not found');
            const data = await resp.json();

            // Flatten all stores with chain info
            this.allStores = [];
            data.stores.forEach(chain => {
              (chain.stores || []).forEach(store => {
                this.allStores.push({
                  ...store,
                  chain: chain.id,
                  chainName: chain.name,
                  color: chain.color
                });
              });
            });

            console.log('Loaded stores:', this.allStores.length);

          } catch (err) {
            console.warn('Failed to load stores:', err);
          }
        },

        sortStoresByDistance() {
          if (!this.userLat || !this.userLng) return;

          // Calculate distance for all stores
          this.allStores.forEach(store => {
            store.distanceKm = this.haversine(
              this.userLat, this.userLng,
              store.lat, store.lng
            );
          });

          // Sort by distance
          this.allStores.sort((a, b) => a.distanceKm - b.distanceKm);

          // Update nearby stores list (top 5 of each chain)
          const seven = this.allStores.filter(s => s.chain === 'seven').slice(0, 5);
          const family = this.allStores.filter(s => s.chain === 'family').slice(0, 5);
          this.nearbyStores = [...seven, ...family].sort((a, b) => a.distanceKm - b.distanceKm);

          // Add product counts to each store (for display)
          this.nearbyStores.forEach(store => {
            store.distance = store.distanceKm.toFixed(1);
            store.productCount = this.counts[store.chain] || 0;
          });
        },

        selectStore(store) {
          this.selectedStore = store;
          // Filter products for this store
          this.filterProducts();
        },

        // Haversine distance (km)
        haversine(lat1, lon1, lat2, lon2) {
          const R = 6371;
          const dLat = (lat2 - lat1) * Math.PI / 180;
          const dLon = (lon2 - lon1) * Math.PI / 180;
          const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
          const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
          return R * c;
        },

        formatDistance(lat, lng) {
          // Simple area guess based on lat/lng
          if (lat > 25.2) return '北部';
          if (lat > 24.5) return '中部';
          if (lat > 24.0) return '南部';
          return '東部';
        },

        // --- Product Data ---
        async fetchData(silent = false) {
          if (!silent) this.loading = true;
          this.error = false;

          try {
            const resp = await fetch(this.dataUrl + '?t=' + Date.now());
            if (!resp.ok) throw new Error('Network error');
            const data = await resp.json();
            this.processData(data);
            this.lastUpdated = this.formatTime(data.updated_at);

          } catch (err) {
            console.warn('Fetch failed:', err);
            if (this.embeddedData) {
              this.processData(this.embeddedData);
              this.lastUpdated = this.formatTime(this.embeddedData.updated_at);
            } else {
              this.error = true;
            }
          } finally {
            this.loading = false;
          }
        },

        processData(data) {
          let all = [];
          data.stores.forEach(chain => {
            chain.products.forEach(p => {
              all.push({
                ...p,
                store_id: chain.id,
                store_name: chain.name,
                store_color: chain.color
              });
            });
          });

          this.products = all;
          this.counts = {
            all: all.length,
            seven: all.filter(p => p.store_id === 'seven').length,
            family: all.filter(p => p.store_id === 'family').length
          };

          this.filterProducts();
        },

        filterProducts() {
          let filtered = this.products;

          // Filter by tab
          if (this.activeTab !== 'all') {
            filtered = filtered.filter(p => p.store_id === this.activeTab);
          }

          // Filter by selected store
          if (this.selectedStore) {
            // When a store is selected, show all products for that store's chain
            // (since we don't have store-level product inventory)
            filtered = filtered.filter(p => p.store_id === this.selectedStore.chain);
          }

          this.filteredProducts = filtered;
          this.currentPage = 1;
          this.displayProducts = filtered.slice(0, this.pageSize);
          this.hasMore = filtered.length > this.pageSize;
        },

        loadMore() {
          this.currentPage++;
          this.displayProducts = this.filteredProducts.slice(0, this.pageSize * this.currentPage);
          this.hasMore = this.displayProducts.length < this.filteredProducts.length;
        },

        openModal(product) {
          this.selectedProduct = product;
          this.modalOpen = true;
        },

        async refresh() {
          await this.fetchData(true);
          if (this.userLat) {
            this.sortStoresByDistance();
          }
        },

        formatTime(iso) {
          if (!iso) return '';
          const d = new Date(iso);
          return d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
      }
    }
  </script>
</body>
</html>
