name: Update Data Every 15 Minutes

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests lxml

      - name: Run crawler
        run: python3 scripts/crawler.py

      - name: Commit & push if changed
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --exit-code data/data.json stores.json 2>/dev/null; then
            echo "Changes detected, committing..."
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add data/
            git commit -m "chore: update data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No changes, skipping commit"
          fi